<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="uRw0ZaoxYeuUt4n64DJlGLxmQWCp3gw4kQ200jg_G5A" />
  
  <meta name="description" content="SIDIK (Sistem Digitalisasi Informasi Konseling) resmi SMKN 3 Tanjungpinang. Portal layanan digital sekolah terpadu untuk siswa, guru, wali kelas, dan orang tua.">
  <meta name="keywords" content="SIDIK SMKN 3, SMKN 3 Tanjungpinang, Skanega, Aplikasi Sekolah SMKN 3, Digitalisasi SMKN 3">
  
  <title>SIDIK - SMKN 3 Tanjungpinang</title>

  <link rel="icon" type="image/png" href="https://smkn3tpi.github.io/sidik/logo.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #f4f6f9;
    }
    /* Desain tombol buka tab baru / darurat */
    .btn-buka-langsung {
      position: absolute;
      top: 15px;
      right: 20px;
      z-index: 9999;
      background-color: #007bff;
      color: #ffffff;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 13px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: background-color 0.3s;
    }
    .btn-buka-langsung:hover {
      background-color: #0056b3;
    }
    .iframe-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      padding-top: 60px; /* Memberi ruang untuk tombol di atas */
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <!-- Tombol ini berfungsi sebagai Bypass jika Google memblokir Iframe (sameorigin) -->
  <a class="btn-buka-langsung" href="https://script.google.com/macros/s/AKfycbyN4N5BMEDNCOkyMRZPiaPr8C1RJoyN_FhxG3aArookCi1WiO1XCi2K7bct7wnZHkUwbw/exec" target="_blank">
    Buka di Tab Baru (Layar Penuh) 🚀
  </a>
  
  <!-- Iframe Aplikasi Utama -->
  <iframe 
    class="iframe-container"
    src="https://script.google.com/macros/s/AKfycbyN4N5BMEDNCOkyMRZPiaPr8C1RJoyN_FhxG3aArookCi1WiO1XCi2K7bct7wnZHkUwbw/exec"
    allowfullscreen="true">
  </iframe>

</body>
</html>
