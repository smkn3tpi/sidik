<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wali Kelas</title>
  <link rel="icon" type="image/png" href="https://smkn3tpi.github.io/sidik/logo.png">
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
  
  <iframe 
    src="https://script.google.com/a/macros/guru.smk.belajar.id/s/AKfycbzIbC15D9iGQoaUQTb4Zbxhm5lXF5LdLaeLuUdQRsvyq6_IORFjB3Kf13KmlRCdjBIG1Q/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      // Fungsi fullscreen opsional, jika mengganggu di HP bisa dihapus
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
