<!DOCTYPE html>
<html lang="id">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasar Preloved Sekolah</title>
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
  
  <iframe 
    src="https://script.google.com/macros/s/AKfycbxAcZ_TCFH0ahcFa5fHiURK2aA_MNSORm1Tfv4D97kcTeQhRUgNku-zsOI63VHCPDG0Jg/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      // Fungsi fullscreen opsional, jika mengganggu di HP bisa dihapus
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
